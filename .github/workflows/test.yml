name: Build and test
on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - '.github/workflows/test.yml'
      - '**Makefile'
      - '**.go'
      - '**.proto'
      - 'go.mod'
      - 'go.sum'
jobs:

  # Static analysis: gofmt, go vet, golangci-lint. Folded into one job so we
  # only pay the setup-go cost once. Runs in parallel with the build/test
  # jobs (no gating) so a fast green signal on good PRs is not blocked.
  static:
    name: Static checks
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        check-latest: true

    - name: Install goimports
      run: go install golang.org/x/tools/cmd/goimports@latest

    - name: gofmt
      run: |
        if [ "$(find . -iname '*.go' | grep -v '\.pb\.go$' | xargs goimports -l)" ]
        then
          find . -iname '*.go' | grep -v '\.pb\.go$' | xargs goimports -d
          exit 1
        fi

    - name: Vet
      run: make vet

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.5

  # Native build + test on each runner OS we have. matrix.include lets each
  # row pick its own build/test/e2e command, which is needed because the
  # boringcrypto and pkcs11 variants use bespoke make targets and an e2e
  # invocation with extra env. Each row produces the binaries on its own
  # native runner, so this matrix is the source of truth for those arches —
  # the cross-build job below does not duplicate them.
  test:
    name: Test ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: linux
          os: ubuntu-latest
          build-cmd: go build ./cmd/nebula ./cmd/nebula-cert
          test-cmd: make test
          e2e-cmd: make e2evv
        - name: linux-boringcrypto
          os: ubuntu-latest
          build-cmd: make bin-boringcrypto
          test-cmd: make test-boringcrypto
          e2e-cmd: make e2e GOEXPERIMENT=boringcrypto CGO_ENABLED=1 TEST_ENV="TEST_LOGS=1" TEST_FLAGS="-v -ldflags -checklinkname=0"
        - name: linux-pkcs11
          os: ubuntu-latest
          build-cmd: make bin-pkcs11
          test-cmd: make test-pkcs11
          e2e-cmd: ''
        - name: macos
          os: macos-latest
          build-cmd: go build ./cmd/nebula ./cmd/nebula-cert
          test-cmd: make test
          e2e-cmd: make e2evv
        - name: windows
          os: windows-latest
          build-cmd: go build ./cmd/nebula ./cmd/nebula-cert
          test-cmd: make test
          e2e-cmd: make e2evv
    steps:

    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        check-latest: true

    - name: Build
      run: ${{ matrix.build-cmd }}

    # Free macos-latest runners are arm64; the test/e2e steps above cover
    # darwin-arm64 natively. This cross-compile gives darwin-amd64 build
    # coverage on a real darwin host without paying for a -large runner.
    - name: Cross-build darwin-amd64
      if: matrix.name == 'macos'
      run: GOARCH=amd64 go build -o /tmp/nebula-amd64 ./cmd/nebula && GOARCH=amd64 go build -o /tmp/nebula-cert-amd64 ./cmd/nebula-cert

    - name: Test
      run: ${{ matrix.test-cmd }}

    - name: End 2 end
      if: matrix.e2e-cmd != ''
      run: ${{ matrix.e2e-cmd }}

    - uses: actions/upload-artifact@v7
      if: matrix.e2e-cmd != '' && always()
      with:
        name: e2e packet flow ${{ matrix.name }}
        path: e2e/mermaid/
        if-no-files-found: warn

  # Cross-compile sanity for platforms we cannot natively run on GitHub
  # runners. linux-amd64, darwin-{arm64,amd64}, and windows-amd64 are
  # deliberately not built here because the native test matrix above
  # already builds them (darwin-amd64 via the cross-build step on the
  # macos runner). windows-arm64 stays because there is no native
  # windows-arm64 runner.
  cross-build:
    name: Cross-build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - {name: linux,   make-target: all-cross-linux}
        - {name: freebsd, make-target: all-freebsd}
        - {name: openbsd, make-target: all-openbsd}
        - {name: netbsd,  make-target: all-netbsd}
        - {name: windows, make-target: all-cross-windows}
        - {name: mobile,  make-target: build-test-mobile}
    steps:

    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        check-latest: true

    - name: Build ${{ matrix.name }}
      run: make -j"$(nproc)" ${{ matrix.make-target }}

  # Aggregator for branch protection. Set this as the single required
  # check; it fails if any of the required upstream jobs failed or was
  # cancelled.
  finish:
    name: CI status
    if: always()
    needs: [static, test, cross-build]
    runs-on: ubuntu-latest
    steps:

    - name: Fail if any upstream job failed
      if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
      run: |
        echo "upstream results: ${{ toJSON(needs) }}"
        exit 1

    - name: All upstream jobs passed
      run: echo "ok"
